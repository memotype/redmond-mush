services:
  postgres:
    image: postgres:16-bookworm
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    networks:
      - redmond_internal
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redmond:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      REDMOND_DATABASE_URL: ${REDMOND_DATABASE_URL}
      REDMOND_SECRET_KEY: ${REDMOND_SECRET_KEY}
    networks:
      - redmond_internal
    ports:
      - 127.0.0.1:${REDMOND_TELNET_PORT:-4000}:4000
      - 127.0.0.1:${REDMOND_WEB_PORT:-4001}:4001
      - 127.0.0.1:${REDMOND_WEBSOCKET_PORT:-4002}:4002

networks:
  redmond_internal:
    driver: bridge

volumes:
  postgres_data:
